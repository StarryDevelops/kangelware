<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KangelWare</title>
    <style>
        @font-face {
            font-family: 'PixelSans';
            src: local('Arial Black'), local('Impact'), sans-serif;
            font-weight: bold;
        }

        :root {
            --neon-pink: #FF4DA6;
            --neon-cyan: #00FFFF;
            --btn-gray: #A0A0A0;
            --btn-text-gray: #606060;
        }

        * {
            box-sizing: border-box;
            cursor: default;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: 'PixelSans', sans-serif;
        }

        /* --- Screen Navigation --- */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease-in-out;
            z-index: 1;
        }

        .active-screen {
            opacity: 1;
            visibility: visible;
            z-index: 2;
        }

        /* 1. Landing Screen */
        #screen-landing {
            background-color: #000000;
            cursor: pointer;
        }

        #click-to-continue {
            font-size: 2.5rem;
            color: #FFFFFF;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* 2. Boot Screen */
        #screen-boot {
            background-color: #000000;
        }

        #boot-logo {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        /* 3. Main Desktop */
        #screen-desktop {
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* --- Window Container using window.png --- */
        .window-container {
            position: relative;
            width: 650px;
            height: 595px; /* Matches the vertical proportions of the original image */
            background-image: url('window.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            box-shadow: 12px 12px 0px rgba(0, 0, 0, 0.4);
            image-rendering: pixelated; /* Keeps borders clean and retro */
        }

        /* Interactive Area overlays perfectly on the cloud canvas section */
        .window-content {
            position: absolute;
            top: 85px; /* Keeps elements safely below the title bar */
            bottom: 45px; /* Keeps elements above the footer bar */
            left: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .header-container {
            margin-top: 20px;
        }

        /* Exact styling matching your target concept image */
        .title-main {
            font-size: 4.8rem;
            margin: 0;
            color: var(--neon-pink);
            text-shadow: 4px 4px 0px #000000;
            letter-spacing: 1px;
            line-height: 1;
        }

        .title-sub {
            font-size: 1.4rem;
            margin: 15px 0 0 0;
            color: #000000;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        /* --- Button Layout --- */
        .button-group {
            display: flex;
            gap: 25px;
            width: 90%;
            justify-content: center;
            margin-bottom: 20px;
        }

        .btn {
            font-family: 'PixelSans', sans-serif;
            font-weight: bold;
            font-size: 1.4rem;
            text-transform: uppercase;
            padding: 18px 0;
            width: 220px;
            border: 4px solid #000000;
            outline: none;
            position: relative;
        }

        /* Active: Vibrant Pink with Cyan Text Shadow */
        .btn-active {
            background-color: var(--neon-pink);
            color: var(--neon-cyan);
            text-shadow: 2px 2px 0px #000000;
            box-shadow: 6px 6px 0px #000000;
            cursor: pointer;
        }

        .btn-active:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px #000000;
        }

        .btn-active:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px #000000;
        }

        /* Disabled Button styling */
        .btn-disabled {
            background-color: var(--btn-gray);
            color: var(--btn-text-gray);
            border-color: var(--btn-text-gray);
            opacity: 0.8;
            cursor: not-allowed;
        }

        /* Decorative Invisible Top-Bar Hitboxes */
        .close-hitbox {
            position: absolute;
            top: 10px;
            right: 15px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            z-index: 10;
        }

    </style>
</head>
<body>

    <!-- Audio Targets -->
    <audio id="audio-boot" src="Boot.mp3" preload="auto"></audio>
    <audio id="audio-loop" src="music.mp3" preload="auto" loop></audio>

    <!-- 1. Landing Screen -->
    <div id="screen-landing" class="screen active-screen" onclick="startBootSequence()">
        <div id="click-to-continue">Click me :3</div>
    </div>

    <!-- 2. Boot Screen -->
    <div id="screen-boot" class="screen">
        <img src="windows.png" id="boot-logo" alt="Boot Sequence">
    </div>

    <!-- 3. Desktop -->
    <div id="screen-desktop" class="screen">
        
        <!-- The Window Container (window.png background) -->
        <div class="window-container">
            
            <!-- Close Button Hitbox overlaying the pixel UI graphic -->
            <div class="close-hitbox" onclick="closeWindow()" title="Close"></div>

            <!-- Foreground Content Layer -->
            <div class="window-content">
                <div class="header-container">
                    <h1 class="title-main">KangelWare</h1>
                    <p class="title-sub">Free pvp based minecraft client</p>
                </div>

                <div class="button-group">
                    <button class="btn btn-disabled" disabled>Download</button>
                    <button class="btn btn-active" onclick="window.open('https://discord.gg/uhPefYGex4', '_blank')">Join Discord</button>
                </div>
            </div>

        </div>

    </div>

    <script>
        const screenLanding = document.getElementById('screen-landing');
        const screenBoot = document.getElementById('screen-boot');
        const screenDesktop = document.getElementById('screen-desktop');
        
        const audioBoot = document.getElementById('audio-boot');
        const audioLoop = document.getElementById('audio-loop');

        function startBootSequence() {
            switchScreens(screenLanding, screenBoot);

            audioBoot.play().catch(err => console.log("Audio play blocked by browser policies.", err));

            // Transition to main desktop once Boot.mp3 ends
            audioBoot.onended = () => {
                transitionToDesktop();
            };
        }

        function transitionToDesktop() {
            switchScreens(screenBoot, screenDesktop);
            audioLoop.play().catch(err => console.log("Loop track play blocked.", err));
        }

        function switchScreens(fromScreen, toScreen) {
            fromScreen.classList.remove('active-screen');
            setTimeout(() => {
                toScreen.classList.add('active-screen');
            }, 600); // Smooth half-second crossfade
        }

        function closeWindow() {
            alert("This window is required to run the streams... (；′д｀)");
        }
    </script>
</body>
</html>
