<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KangelWare - MineCraft PVP Client</title>
    <style>
        /*
          Core Aesthetic (Needy Streamer Overload inspired by image_0.png)
          Key Features: Cyan borders, Pink interiors, Purple/Blue gradient headers, Bold Sans-serif font.
        */

        @font-face {
            font-family: 'PixelSans';
            /* Using a common bold sans-serif as fallback for the game's chunky UI font */
            src: local('Arial Black'), local('Impact'), sans-serif;
            font-weight: bold;
        }

        :root {
            --bg-color-pink: #FFC0CB;
            --window-border-cyan: #00FFFF;
            --header-gradient-start: #4169E1; /* Royal Blue */
            --header-gradient-end: #8A2BE2; /* BlueViolet */
            --text-color: #FFFFFF;
            --button-pink: #FF69B4;
            --button-disabled: #A9A9A9;
            --close-red: #FF0000;
        }

        * {
            box-sizing: border-box;
            cursor: default;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Initial black screen */
            font-family: 'PixelSans', sans-serif;
            color: var(--text-color);
        }

        /* --- Screens --- */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease-in-out;
            z-index: 1;
        }

        .active-screen {
            opacity: 1;
            visibility: visible;
            z-index: 2;
        }

        /* 1. Landing Screen */
        #screen-landing {
            background-color: #000;
        }

        #click-to-continue {
            font-size: 3em;
            color: #FFF;
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* 2. Boot Screen */
        #screen-boot {
            background-color: #000;
        }

        #boot-logo {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }

        /* 3. Main Desktop */
        #screen-desktop {
            /* Full-screen fixed background.png */
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* --- The Retro Popup Window (Styling based on image_0.png) --- */
        .retro-window {
            width: 600px;
            max-width: 90%;
            /* Thick vibrant cyan border seen in reference */
            border: 4px solid var(--window-border-cyan);
            background-color: var(--bg-color-pink);
            /* Add subtle pattern/gradient inside window for depth */
            background-image: linear-gradient(to bottom, #FFE0E9, #FFC0CB);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5); /* Classic retro shadow */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Title Bar */
        .window-titlebar {
            height: 35px;
            /* Blue/Purple gradient seen in image_0.png top bars */
            background: linear-gradient(90deg, var(--header-gradient-start), var(--header-gradient-end));
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
            border-bottom: 2px solid #000; /* Sharp separation */
        }

        .title-text {
            font-size: 1.2em;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 0px #000;
            padding-left: 5px;
        }

        .window-controls {
            display: flex;
            gap: 3px;
        }

        /* Classic XP/98 control buttons */
        .control-btn {
            width: 25px;
            height: 25px;
            border: 2px solid #000;
            background-color: #C0C0C0; /* Standard gray button base */
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #000;
            font-size: 1.2em;
        }

        .control-btn:active {
            border: 2px solid #FFF #808080 #808080 #FFF; /* Inset effect */
        }

        .control-btn.close {
            /* Red 'X' required */
            color: var(--close-red);
        }

        /* Window Content */
        .window-body {
            padding: 40px;
            color: #000; /* Dark text inside pink body */
            text-align: center;
        }

        .body-header {
            font-size: 4em; /* Very large bold header */
            margin: 0 0 10px 0;
            line-height: 1;
            color: #8A2BE2; /* Using header purple for main text contrast */
        }

        .body-description {
            font-size: 1.3em;
            margin: 0 0 40px 0;
            opacity: 0.8;
        }

        /* Bottom Buttons */
        .window-action-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: auto;
        }

        .action-button {
            padding: 15px 30px;
            font-family: 'PixelSans', sans-serif;
            font-weight: bold;
            font-size: 1.2em;
            text-transform: uppercase;
            border: 3px solid #000;
            color: #000;
            transition: transform 0.1s;
        }

        /* Active vibrant Join Discord button */
        .btn-active {
            background-color: var(--button-pink);
            box-shadow: 5px 5px 0px #800080; /* Purple shadow for active */
            cursor: pointer;
        }

        .btn-active:hover {
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0px #800080;
        }

        .btn-active:active {
            transform: translate(5px, 5px);
            box-shadow: 0px 0px 0px #800080;
        }

        /* Disabled grayed out Download button */
        .btn-disabled {
            background-color: var(--button-disabled);
            border-color: #555;
            color: #555;
            box-shadow: none;
            opacity: 0.6;
            cursor: not-allowed;
        }

    </style>
</head>
<body>

    <!-- Audio Elements (Required assets: Boot.mp3, music.mp3) -->
    <audio id="audio-boot" src="Boot.mp3" preload="auto"></audio>
    <audio id="audio-loop" src="music.mp3" preload="auto" loop></audio>

    <!-- 1. Landing / Black Screen -->
    <div id="screen-landing" class="screen active-screen">
        <div id="click-to-continue">Click me :P</div>
    </div>

    <!-- 2. Boot Sequence (Referencing windows.png) -->
    <div id="screen-boot" class="screen">
        <img src="windows.png" id="boot-logo" alt="Windows Boot Logo">
    </div>

    <!-- 3. Main Desktop (background.png applied via CSS) -->
    <div id="screen-desktop" class="screen">
        
        <!-- The KangelWare Popup Window -->
        <div class="retro-window">
            
            <!-- Title Bar -->
            <div class="window-titlebar">
                <span class="title-text">KangelWare</span>
                <div class="window-controls">
                    <div class="control-btn minimize">_</div>
                    <div class="control-btn maximize">&#9634;</div>
                    <div class="control-btn close">X</div>
                </div>
            </div>

            <!-- Window Content -->
            <div class="window-body">
                <h1 class="body-header">KangelWare</h1>
                <p class="body-description">Free pvp based minecraft client</p>
                
                <div class="window-action-area">
                    <!-- Disabled Download Button -->
                    <button class="action-button btn-disabled" disabled>Download</button>
                    <!-- Active Join Discord Button -->
                    <button class="action-button btn-active" onclick="window.open('https://discord.gg/uhPefYGex4', '_blank')">Join Discord</button>
                </div>
            </div>

        </div> <!-- /retro-window -->

    </div> <!-- /screen-desktop -->

    <script>
        // DOM Elements
        const screenLanding = document.getElementById('screen-landing');
        const screenBoot = document.getElementById('screen-boot');
        const screenDesktop = document.getElementById('screen-desktop');
        
        const audioBoot = document.getElementById('audio-boot');
        const audioLoop = document.getElementById('audio-loop');

        // Flow Control
        
        // Step 1: Handle User Gesture to initiate experience (Browsers block autoplay)
        screenLanding.addEventListener('click', startBootSequence);

        function startBootSequence() {
            // Remove click listener immediately
            screenLanding.removeEventListener('click', startBootSequence);

            // Transition: Landing -> Boot
            switchScreens(screenLanding, screenBoot);

            // Play Boot Audio
            audioBoot.play().catch(error => console.log("Audio play blocked:", error));

            // Setup Transition: Desktop loads when Boot Audio ends
            audioBoot.onended = () => {
                transitionToDesktop();
            };
            
            // Fallback: If audio fails to load or play, transition after fixed time
            // audioBoot.onerror = () => { transitionToDesktop(); };
            // setTimeout(transitionToDesktop, 5000); // Back up if needed
        }

        function transitionToDesktop() {
            // Transition: Boot -> Desktop
            switchScreens(screenBoot, screenDesktop);

            // Start Main Music Loop
            audioLoop.play().catch(error => console.log("Audio loop blocked:", error));
        }

        // Helper: Hides current screen, shows next screen
        function switchScreens(currentScreen, nextScreen) {
            currentScreen.classList.remove('active-screen');
            // Wait for fade out
            setTimeout(() => {
                nextScreen.classList.add('active-screen');
            }, 500); // Slight delay for smoother feel, matches css transition
        }

        // Basic sanity check for close button (aesthetic only)
        document.querySelector('.control-btn.close').addEventListener('click', function() {
            alert("Use the client fag. (^_^)");
        });

    </script>
</body>
</html>
