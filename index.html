<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
          font-family: 'Inter', system-ui, sans-serif;
          background:
            linear-gradient(135deg, #0f001a 0%, #1a0033 100%),
            radial-gradient(circle at 50% 50%, rgba(168, 85, 247, 0.08) 0%, transparent 70%);
        }
        .grid-bg {
          background-image:

          background-size: 50px 50px;
        }
        .hero-glow {
          text-shadow: 0 0 30px rgb(168 85 247 / 0.6);
        }
        .gui-float {
          transform: perspective(1000px) rotateY(-18deg) rotateX(10deg);
          transition: transform 0.4s ease;
        }
        .gui-float:hover {
          transform: perspective(1000px) rotateY(-12deg) rotateX(6deg);
        }

<body class="bg-zinc-950 text-white grid-bg min-h-screen">
